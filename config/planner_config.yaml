# Planner: Qwen2.5-0.5B-Instruct + LoRA, trained on SOP→plan pairs.
# Run: python -m src.planner.train_planner_lora

model:
  base: "Qwen/Qwen2.5-0.5B-Instruct"   # 494M params, runs on CPU
  adapter_dir: "artifacts/planner_lora/adapter"
  tokenizer_dir: "artifacts/planner_lora/tokenizer"

training:
  epochs: 3
  batch_size: 2
  learning_rate: 2.0e-4
  max_input_length: 768

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  # Targets are set in code to ["q_proj","k_proj","v_proj","o_proj"]
  # which match the Qwen attention module names.

generation:
  max_new_tokens: 256
  do_sample: false

paths:
  train_data: "src/data/sop_examples.json"
  output_dir: "artifacts/planner_lora"

safety:
  allowed_skills:
    - walk_to
    - press_button
    - wait
    - read_sensor
    - pick
    - place
    - notify
  max_plan_length: 30
