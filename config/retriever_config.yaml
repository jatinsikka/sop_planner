# Retriever: sentence-transformers (BGE-small) fine-tuned with InfoNCE.
# Run: python -m src.retrieval.build_dual_encoder

model:
  name: "BAAI/bge-small-en-v1.5"   # 33M params, CPU-friendly, current SOTA among small encoders

data:
  train_json: "src/data/sop_examples.json"
  train_key: "sop_examples"

training:
  epochs: 3
  batch_size: 16
  learning_rate: 2.0e-5

output:
  out_dir: "artifacts/retriever"

index:
  index_dir: "artifacts/retriever/index"
  top_k: 5

eval:
  reranker_enabled: false
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  reranker_top_k: 10
